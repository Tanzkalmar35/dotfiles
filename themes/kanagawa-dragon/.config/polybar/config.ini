; Kanagawa Dragon — polybar config

; ── colors ───────────────────────────────────────────────────────────────────

[colors]
bg      = #181616
fg      = #c5c9c5
accent  = #7fb4ca
subtle  = #a6a69c
overlay = #2d4f67
surface = #1f1d1d
red     = #c4746e
green   = #8a9a7b
yellow  = #c4b28a
black   = #0d0c0c

; ── bar ──────────────────────────────────────────────────────────────────────

[bar/bar1]
width            = 100%
height           = 22pt
radius           = 0
dpi              = 95
monitor          = ${env:MONITOR:}

background       = ${colors.bg}
foreground       = ${colors.fg}

line-size        = 0
border-size      = 0
border-bottom-size  = 1pt
border-bottom-color = ${colors.overlay}

padding-left   = 2
padding-right  = 2
module-margin  = 1

font-0 = "JetBrainsMono Nerd Font:style=Regular:size=10;2"
font-1 = "JetBrainsMono Nerd Font:style=Regular:size=10;2"
font-2 = "JetBrainsMono Nerd Font:style=Regular:size=14;3"

modules-left   = theme-picker i3
modules-center = date
modules-right  = cpu memory temp pulseaudio battery wlan power_menu

cursor-click      = pointer
cursor-scroll     = ns-resize
enable-ipc        = true
wm-restack        = i3
override-redirect = false

; ── theme picker ─────────────────────────────────────────────────────────────

[module/theme-picker]
type             = custom/script
exec             = echo "󰏘  $(cat ~/dotfiles/.current-theme)"
interval         = 0
label-foreground = ${colors.accent}
label-padding    = 1
click-left       = ~/.config/polybar/theme-picker.sh &

; ── i3 ───────────────────────────────────────────────────────────────────────

[module/i3]
type           = internal/i3
show-urgent    = true
index-sort     = true
enable-click   = true
fuzzy-match    = true
pin-workspaces = true

ws-icon-0 = 1;󰎤
ws-icon-1 = 2;󰎧
ws-icon-2 = 3;󰎪
ws-icon-3 = 4;󰎭
ws-icon-4 = 5;󰎱
ws-icon-5 = 6;󰎳
ws-icon-6 = 7;󰎶
ws-icon-7 = 8;󰎹

format = <label-state> <label-mode>

label-mode            = %mode%
label-mode-padding    = 1
label-mode-foreground = ${colors.yellow}

label-focused            = %icon%
label-focused-font       = 3
label-focused-foreground = ${colors.accent}
label-focused-padding    = 1

label-unfocused            = %icon%
label-unfocused-font       = 3
label-unfocused-foreground = ${colors.overlay}
label-unfocused-padding    = 1

label-visible         = %icon%
label-visible-padding = 1

label-urgent            = %icon%
label-urgent-font       = 3
label-urgent-foreground = ${colors.red}
label-urgent-padding    = 1

; ── date ─────────────────────────────────────────────────────────────────────

[module/date]
type     = internal/date
interval = 30

date     = %d %b
time     = %H:%M
date-alt = %A, %d %B %Y
time-alt = %H:%M:%S

format-prefix            = " "
format-prefix-foreground = ${colors.subtle}
label                    = %date%  %time%
label-foreground         = ${colors.fg}

; ── cpu ──────────────────────────────────────────────────────────────────────

[module/cpu]
type                     = internal/cpu
interval                 = 2
format-prefix            = " "
format-prefix-foreground = ${colors.subtle}
label                    = %percentage%% cpu
label-foreground         = ${colors.fg}

; ── memory ───────────────────────────────────────────────────────────────────

[module/memory]
type                     = internal/memory
interval                 = 10
format-prefix            = " "
format-prefix-foreground = ${colors.subtle}
label                    = %percentage_used%% ram
label-foreground         = ${colors.fg}

; ── temperature ──────────────────────────────────────────────────────────────

[module/temp]
type             = internal/temperature
interval         = 3
thermal-zone     = 0
hwmon-path       = /sys/class/hwmon/hwmon1/temp1_input
base-temperature = 36
warn-temperature = 60
units            = true

format-prefix            = " "
format-prefix-foreground = ${colors.subtle}
label                    = %temperature-c% tmp
label-foreground         = ${colors.fg}

format-warn-prefix            = " "
format-warn-prefix-foreground = ${colors.red}
label-warn                    = %temperature-c% tmp
label-warn-foreground         = ${colors.red}

; ── volume ───────────────────────────────────────────────────────────────────

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix            = " "
format-volume-prefix-foreground = ${colors.subtle}
label-volume                    = %percentage%% vol
label-volume-foreground         = ${colors.fg}

label-muted            = 󰖁 muted
label-muted-foreground = ${colors.overlay}

; ── battery ──────────────────────────────────────────────────────────────────

[module/battery]
type          = internal/battery
full-at       = 99
low-at        = 20
battery       = BAT0
adapter       = ADP1
poll-interval = 60

format-charging           = <animation-charging> <label-charging>
label-charging            = %percentage%% bat
label-charging-foreground = ${colors.green}

format-discharging           = <ramp-capacity> <label-discharging>
label-discharging            = %percentage%% bat
label-discharging-foreground = ${colors.fg}

format-full-prefix            = " "
format-full-prefix-foreground = ${colors.subtle}
label-full                    = %percentage%% bat
label-full-foreground         = ${colors.fg}

label-low            = 󰁻 %percentage%% bat
label-low-foreground = ${colors.red}

ramp-capacity-0            = " "
ramp-capacity-1            = " "
ramp-capacity-2            = " "
ramp-capacity-3            = " "
ramp-capacity-4            = " "
ramp-capacity-0-foreground = ${colors.red}
ramp-capacity-1-foreground = ${colors.yellow}
ramp-capacity-2-foreground = ${colors.fg}
ramp-capacity-3-foreground = ${colors.fg}
ramp-capacity-4-foreground = ${colors.green}

animation-charging-0         = " "
animation-charging-1         = " "
animation-charging-2         = " "
animation-charging-3         = " "
animation-charging-4         = " "
animation-charging-framerate = 750

; ── network ──────────────────────────────────────────────────────────────────

[module/wlan]
type           = internal/network
interface-type = wireless
interval       = 5

format-connected-prefix            = "󰖩 "
format-connected-prefix-foreground = ${colors.subtle}
label-connected                    = %essid% net
label-connected-foreground         = ${colors.fg}

label-disconnected            = 󰖪 offline
label-disconnected-foreground = ${colors.overlay}

; ── power ────────────────────────────────────────────────────────────────────

[module/power_menu]
type             = custom/script
exec             = echo "⏻"
label-padding    = 1
label-foreground = ${colors.subtle}
click-left       = ~/.config/rofi/powermenu/powermenu.sh &

; ── settings ─────────────────────────────────────────────────────────────────

[settings]
screenchange-reload = true
pseudo-transparency = true
