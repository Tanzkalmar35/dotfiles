;#source:https://github.com/Alopes01/Dotfiles
[colors]
background = #282a36
foreground = #f8f8f2
primary = #90acb3
secondary = #90acb3
alert = #ff5555
green = #50fa7b
red = #ff5555 
white = #ffffff

; ...

[bar/bar1]
width = 100%
height = 24pt
radius = 10
dpi = 95
monitor = ${env:MONITOR:}

background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
border-size = 3pt
border-color = ${colors.secondary}
padding-left = 5
padding-right = 4
module-margin = 3

separator = |
separator-foreground = ${colors.white}


font-0 = "JetBrainsMono Nerd Font:style=Regular:size=10;2"
font-1 = "JetBrainsMono Nerd Font:style=Regular:size=10;2"
font-2 = "JetBrainsMono Nerd Font:style=Regular:size=15;2"
modules-left = date

modules-right = pulseaudio battery memory temp cpu wlan  power_menu

modules-center = i3
cursor-click = pointer

cursor-scroll = ns-resize

enable-ipc = true

wm-restack = i3

override-redirect = false
 

;------------------------------

[module/i3]
type = internal/i3
show-urgent = true
index-sort = true
enable-click = true
fuzzy-match = true
pin-workspaces = true

ws-icon-0 = 1;ůįé§
ws-icon-1 = 2;ůįéß
ws-icon-2 = 3;ůįé™
ws-icon-3 = 4;ůįé≠
ws-icon-4 = 5;ůįéĪ
ws-icon-5 = 6;ůįé≥
ws-icon-6 = 7;ůįé∂
ws-icon-7 = 8;ůįéĻ

format = <label-state> <label-mode>
label-mode = %mode%
label-mode-padding = 1
label-mode-foreground = ${colors.primary}

label-focused = %icon%
label-focused-font = 3
label-focused-foreground = ${colors.primary}
label-focused-padding = 1

label-unfocused = %icon%
label-unfocused-font = 3
label-unfocused-foreground = ${colors.white}
label-unfocused-padding = 1

label-visible = %icon%
label-visible-padding = 1

label-urgent = %icon%
label-urgent-font = 3
label-urgent-foreground = ${colors.red}
label-urgent-padding = 1
;------------------------------


[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "ÔÄ® "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-volume-foreground= ${colors.white}
label-volume-padding-left=2
label-volume-padding-right=2

label-muted = [ ůįĖĀ ]  muted
label-muted-foreground = ${colors.red}
label-muted-padding=2
;---------------------------------

[module/battery]
type = internal/battery
full-at = 99
low-at = 20
battery = BAT0
adapter = ADP1
poll-interval = 60
time-format = %H:%M

format-charging =  <animation-charging><label-charging>
format-charging-foreground = ${colors.green}
label-charging = %percentage%%
label-charging-foreground = ${colors.white}
label-charging-padding= 2

format-discharging = <ramp-capacity><label-discharging>
format-discharging-foreground = ${colors.primary}
label-discharging = %percentage%%
label-discharging-foreground = ${colors.white}
label-discharging-padding= 2

format-full-prefix = "ÔČÄ "
format-full-foreground = ${colors.primary}
label-full = %percentage%%
label-full-foreground = ${colors.white}
label-full-padding = 2

label-low = [  BATTERY LOW ] %percentage%%
label-low-foreground = ${colors.red}
label-low-padding = 2

ramp-capacity-0 = "ÔČĄ "
ramp-capacity-1 = "ÔČÉ "
ramp-capacity-2 = "ÔČā "
ramp-capacity-3 = "ÔČĀ "
ramp-capacity-4 = "ÔČÄ "

ramp-capacity-0-foreground = ${colors.red}

bar-capacity-width = 10

animation-charging-0 = "ÔČĄ "
animation-charging-1 = "ÔČÉ "
animation-charging-2 = "ÔČā "
animation-charging-3 = "ÔČĀ "
animation-charging-4 = "ÔČÄ "
animation-charging-framerate = 750

animation-discharging-0 = "ÔČÄ "
animation-discharging-1 = "ÔČĀ "
animation-discharging-2 = "ÔČā "
animation-discharging-3 = "ÔČÉ "
animation-discharging-4 = "ÔČĄ "
animation-discharging-framerate = 500

animation-low-0 = !
animation-low-1 = !!
animation-low-framerate = 200

;-------------------------------


[module/memory]

type = internal/memory
interval = 10
format-prefix = "ÓŅÖ  "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

;-------------------------
[module/cpu]

type = internal/cpu
interval = 2
format-prefix = "Ôíľ "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%
;--------------------------


[module/wlan]
type = internal/network
interface-type = wireless

interval = 5
format-connected-prefix = "ůįĖ© "
format-connected-prefix-foreground = ${colors.primary}
format-connected-foreground = ${colors.primary}
format-connected = <label-connected> 
label-connected = %essid%
label-connected-foreground = ${colors.white}
label-connected-padding = 0

format-disconnected = <label-disconnected>
format-disconnected-padding = 0
label-disconnected = ůįĖ™
label-disconnected-foreground = ${colors.secondary}
label-disconnected-padding = 0

;----------------------------
[module/power_menu]
type = custom/script
exec = echo "‚ŹĽ"
format = <label>
label-padding = 1
label-foreground = ${colors.primary}
; click-right = ~/.config/rofi.alopes/Rofi_Wifi_Menu.sh &
click-left = ~/.config/rofi/powermenu/powermenu.sh &
;---------------------------------

[module/date]

type = internal/date
interval = 1
format-prefix = "ÔĀ≥ "
format-prefix-foreground=${colors.primary}

date = %A  %d %b %Y | %H:%M:%S |
label =%date% 
label-foreground = ${colors.white}
label-padding-left=2
label-padding-right=2
 
;---------------------------------

[module/temp]
type = internal/temperature
interval = 3
thermal-zone = 0
hwmon-path = /sys/class/hwmon/hwmon1/temp1_input
base-temperature = 36 
warn-temperature = 60
units = true

format =<label>
format-prefix = "Ôčä "
format-prefix-foreground= ${colors.primary}

label = %temperature-c%
label-foreground = ${colors.white}
label-padding-left=2
label-padding-right=2

format-warn-prefix = "Ôčá "
format-warn-prefix-foreground= ${colors.red}

label-warn = %temperature-c%
label-warn-foreground = ${colors.red}
label-warn-padding-left=2
label-warn-padding-right=2
;------------------------

[settings]

screenchange-reload = true
pseudo-transparency = true
