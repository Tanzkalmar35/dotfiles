# import theme — stow swaps this file
general.import = ["~/.config/alacritty/colors.toml"]

[terminal.shell]
program = "/usr/bin/nu"
args = ["-l"]

[font]
size = 13.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[window]
padding = { x = 12, y = 12 }
decorations = "None"
opacity = 1.0

[scrolling]
history = 10000

[cursor]
style = { shape = "Block", blinking = "Off" }
