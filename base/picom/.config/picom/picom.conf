# picom config — focus oriented, subtle effects only

# ── backend ──────────────────────────────────────────────────────────────────

backend     = "glx";
vsync       = true;


# ── shadows ──────────────────────────────────────────────────────────────────

shadow          = true;
shadow-radius   = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity  = 0.4;

# don't draw shadows on these
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g = 'slop'",
  "class_g = 'Polybar'",
  "_GTK_FRAME_EXTENTS@"
];

# ── fading ───────────────────────────────────────────────────────────────────

# subtle fade on window open/close — gives your brain a beat to context switch
fading       = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta   = 4;

fade-exclude = [];

# ── transparency ─────────────────────────────────────────────────────────────

# slight transparency on inactive windows — focused window always stands out
inactive-opacity        = 1.0;
active-opacity          = 1.0;
frame-opacity           = 1.0;
inactive-opacity-override = false;

# don't dim inactive windows — transparency is enough
inactive-dim = 0.0;

opacity-rule = [
  "100:class_g = 'Polybar'",
  "100:class_g = 'i3lock'",
  "95:class_g = 'Rofi'"
];

# ── corners ──────────────────────────────────────────────────────────────────

corner-radius = 8;

rounded-corners-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'i3lock'"
];

# ── blur ─────────────────────────────────────────────────────────────────────

# disabled — blur looks nice but adds GPU load and visual complexity
blur-method = "none";

# ── general ──────────────────────────────────────────────────────────────────

mark-wmwin-focused   = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity  = true;
detect-transient       = true;
use-damage             = true;
log-level = "warn";
