set-environment -g PATH "/usr/local/bin:/usr/bin:/bin:$HOME/.local/bin"
set-option -g default-terminal 'tmux-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'
set-option -g default-shell /usr/bin/nu

# prefix
set -g prefix ^F

# behaviour
set -g base-index 1
set -g pane-base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on
set -g status-position top
setw -g mode-keys vi

# source theme — stow swaps this
source-file ~/.config/tmux/colors.conf

# pane borders (colors come from colors.conf)
set -g pane-active-border-style "fg=#{@color-accent},bg=default"
set -g pane-border-style "fg=#{@color-overlay},bg=default"

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'tmux-plugins/tmux-continuum'

# plugin config
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color "#{@color-accent}"
set -g @floax-text-color "#{@color-fg}"
set -g @floax-bind 'p'
set -g @floax-change-path 'true'
set -g @sessionx-x-path '~/projects'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'true'
set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-bind 'o'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-filter-current 'false'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'ssh nvim vim node npm cargo lazygit'
set -g @continuum-restore 'off'
set -g @continuum-save-interval '10'

# keybindings
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
bind-key M run-shell "~/.config/tmux/scripts/session-manager.sh"

# status bar — minimal, no powerline separators
set -g status-style "bg=#{@color-bg},fg=#{@color-fg}"
set -g status-left-length 40
set -g status-right-length 60
set -g status-left "#[fg=#{@color-accent},bold] #S #[fg=#{@color-overlay}]│ "
set -g status-right "#[fg=#{@color-subtle}]%H:%M #[fg=#{@color-overlay}]│ #[fg=#{@color-accent}]#{b:pane_current_path} "
set -g window-status-format "#[fg=#{@color-subtle}] #I #W "
set -g window-status-current-format "#[fg=#{@color-fg},bold] #I #W#{?window_zoomed_flag, (),} "
set -g window-status-separator ""

run '~/.tmux/plugins/tpm/tpm'
