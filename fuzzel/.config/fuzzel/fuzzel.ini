[main]
font=JetBrainsMono Nerd Font:size=14
prompt="> "
icon-theme=Papirus-Dark
icons-enabled=yes
lines=10
width=40
horizontal-pad=20
vertical-pad=15
inner-pad=5

[colors]
# Catppuccin Mocha Palette (RGBA format for Fuzzel: RRGGBBAA)
background=1e1e2ee6      # Base (slightly transparent)
text=cdd6f4ff            # Text
match=89b4faff           # Blue accent for typed matches
selection=313244ff       # Surface color for selected item
selection-text=89b4faff  # Blue accent for selected text
border=89b4faff          # Blue border

[border]
width=2
radius=12
